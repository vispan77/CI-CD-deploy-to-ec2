name: ci cd deply to ec2

on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v8

      - name: deploy via ssh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.SSH_HOST}}
          username: ubuntu
          key: ${{secrets.SSH_KEY}}
          script: |
            cd ~/CI-CD-deploy-to-ec2
            git pull
            sudo docker compose down
            sudo docker compose up -d --build